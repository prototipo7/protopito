<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Farmácia Hospitalar</title>

<style>
body, html {
    margin:0;
    padding:0;
    font-family:'Segoe UI', Tahoma, sans-serif;
    background:#f5f6fa;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
}

.login-container {
    background:white;
    padding:40px 30px 30px 30px;
    border-radius:12px;
    box-shadow:0 4px 15px rgba(0,0,0,0.2);
    width:350px;
    max-width:90%;
    display:flex;
    flex-direction:column;
    align-items:center;
}

.login-avatar {
    width:100px;
    height:100px;
    border-radius:50%;
    background:#6c5ce7 url('https://cdn-icons-png.flaticon.com/512/3135/3135715.png') center/cover no-repeat;
    margin-bottom:20px;
    border:4px solid white;
}

h2 {
    margin-bottom:20px;
    color:#2d3436;
}

input, select {
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:6px;
    border:1px solid #ccc;
    font-size:14px;
}

button {
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:6px;
    background:#6c5ce7;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover {
    background:#a29bfe;
}

.error {
    color:red;
    font-size:14px;
    margin-top:10px;
    display:none;
    text-align:center;
}

/* RESPONSIVO */
@media(max-width:400px){
    .login-container {
        width:95%;
        padding:25px;
    }

    .login-avatar {
        width:80px;
        height:80px;
    }
}
</style>
</head>

<body>

<div class="login-container">
    <div class="login-avatar"></div>
    <h2>Seja Bem-vindo</h2>

    <input type="text" id="username" placeholder="Usuário">
    <input type="password" id="password" placeholder="Senha">

    <select id="role">
        <option value="visitante">Visitante</option>
        <option value="enfermeiro">Enfermeiro</option>
        <option value="chefe">Chefe</option>
    </select>

    <button onclick="login()">Entrar</button>

    <div class="error" id="errorMsg">Usuário ou senha incorretos!</div>
</div>

<script>
// CRIA USERS PADRÃO SE NÃO EXISTIR
if(!localStorage.getItem('users')){
    const defaultUsers = [
        {username:'visitante', password:'123', role:'visitante'},
        {username:'enfermeiro', password:'123', role:'enfermeiro'},
        {username:'chefe', password:'123', role:'chefe'}
    ];
    localStorage.setItem('users', JSON.stringify(defaultUsers));
}

// LOGIN
function login(){
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const role = document.getElementById('role').value;

    const users = JSON.parse(localStorage.getItem('users'));

    const user = users.find(u =>
        u.username === username &&
        u.password === password &&
        u.role === role
    );

    if(user){
        localStorage.setItem('currentUserRole', user.role);
        window.location.href = 'index.html';
    } else {
        document.getElementById('errorMsg').style.display = 'block';
    }
}
</script>

</body>
</html>
